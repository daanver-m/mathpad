<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathPad — Interactief wiskundeplatform</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:#f8f7f4;color:#0f172a;height:100vh;overflow:hidden;font-size:14px;line-height:1.5}
:root{
  --p:#4f46e5;--pd:#3730a3;--pl:#eef2ff;--pb:#c7d2fe;
  --t:#0f172a;--t2:#475569;--t3:#94a3b8;
  --bdr:#e2e8f0;--bg:#f1f5f9;--bg2:#f8fafc;--w:#fff;
  --ok:#059669;--ok-b:#ecfdf5;--ok-br:#a7f3d0;
  --er:#e11d48;--er-b:#fff1f2;--er-br:#fecdd3;
  --wn:#d97706;--wn-b:#fffbeb;--wn-br:#fde68a;
  --r:10px;--rs:7px;--sh:0 1px 3px rgba(0,0,0,.07);--sb:#0f172a
}
#app{height:100vh;overflow:hidden}

/* ── AUTH ── */
.auth{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#eef2ff 0%,#f8f7f4 55%,#faf5ff 100%);padding:20px;overflow-y:auto}
.auth-card{background:var(--w);border:1px solid var(--bdr);border-radius:16px;padding:34px 38px;width:100%;max-width:448px;box-shadow:0 8px 32px rgba(79,70,229,.07)}
.auth-logo{text-align:center;margin-bottom:24px}
.auth-logo-ic{width:50px;height:50px;background:linear-gradient(135deg,var(--p),#7c3aed);border-radius:12px;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px;font-weight:900;box-shadow:0 4px 12px rgba(79,70,229,.3)}
.auth-logo h1{font-size:22px;font-weight:900;color:var(--t);letter-spacing:-.5px}
.auth-logo p{font-size:12px;color:var(--t3);margin-top:2px}
.tabs-bar{display:flex;background:#f1f5f9;border-radius:8px;padding:3px;margin-bottom:18px}
.taab{flex:1;padding:7px;border-radius:6px;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .12s;color:var(--t2);background:transparent}
.taab.on{background:var(--w);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.1)}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.role-btn{padding:10px;border:2px solid var(--bdr);border-radius:var(--rs);cursor:pointer;text-align:center;font-size:12.5px;font-weight:600;color:var(--t2);background:var(--w);transition:all .12s}
.role-btn:hover{border-color:var(--pb)}.role-btn.on{border-color:var(--p);background:var(--pl);color:var(--p)}
.fg{margin-bottom:12px}
.fl{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t2);margin-bottom:5px}
.fi{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:8px 12px;font-size:13.5px;font-family:inherit;color:var(--t);background:var(--w);outline:none;transition:all .12s}
.fi:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.fi.err{border-color:var(--er)}.ferr{font-size:11.5px;color:var(--er);margin-top:3px}
.form2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-full{width:100%;padding:10px;font-size:14px;font-weight:700;border:none;border-radius:var(--rs);cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;gap:6px;font-family:inherit}
.btn-pp{background:var(--p);color:#fff}.btn-pp:hover{background:var(--pd)}
.demo-area{margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.demo-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3);text-align:center;margin-bottom:7px}
.demo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.di{border:1px solid var(--bdr);border-radius:var(--rs);padding:8px 10px;background:var(--w);cursor:pointer;transition:all .12s;text-align:left}
.di:hover{background:var(--pl);border-color:var(--pb)}
.di.t{border-color:#c7d2fe;background:#f8faff}.di.t:hover{background:var(--pl)}
.di strong{display:block;font-size:12px;font-weight:700;color:var(--t);margin-bottom:1px}
.di span{font-size:10.5px;color:var(--t3)}
.info-note{background:var(--pl);border:1px solid var(--pb);border-radius:var(--rs);padding:9px 12px;font-size:12px;color:#3730a3;margin-top:7px}

/* ── TEACHER LAYOUT ── */
.t-layout{display:flex;height:100vh;overflow:hidden;background:var(--sb)}
.sidebar{width:220px;background:var(--sb);display:flex;flex-direction:column;flex-shrink:0;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto}
.sb-brand{padding:16px 14px 10px;display:flex;align-items:center;gap:9px}
.sb-ic{width:30px;height:30px;background:var(--p);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:13px;flex-shrink:0}
.sb-nm{font-weight:800;font-size:14px;color:#f1f5f9;letter-spacing:-.3px}
.sb-tg{font-size:9px;color:#64748b;background:rgba(255,255,255,.06);padding:1px 5px;border-radius:3px}
.sb-sec{padding:2px 14px 4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#374151;margin-top:6px}
.nw{padding:0 6px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:500;color:#94a3b8;transition:all .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit;margin-bottom:1px;position:relative}
.ni:hover{color:#e2e8f0;background:rgba(255,255,255,.05)}
.ni.on{color:#fff;background:var(--p)}
.ni svg{flex-shrink:0;opacity:.9}
.ni .nb{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:var(--er);color:#fff;border-radius:10px;min-width:17px;height:17px;display:flex;align-items:center;justify-content:center;font-size:9.5px;font-weight:800;padding:0 3px}
.sb-foot{margin-top:auto;padding:10px;border-top:1px solid rgba(255,255,255,.06)}
.sb-user{display:flex;align-items:center;gap:8px}
.sb-logout{margin-left:auto;background:none;border:none;color:#64748b;cursor:pointer;padding:3px;border-radius:4px;display:flex;align-items:center}
.sb-logout:hover{color:#e2e8f0}
.t-main{flex:1;overflow:hidden;background:var(--bg);display:flex;flex-direction:column}
.topbar{height:48px;background:var(--w);border-bottom:1px solid var(--bdr);padding:0 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:15px;font-weight:800;color:var(--t);letter-spacing:-.3px}
.page-sub{font-size:11.5px;color:var(--t3);margin-top:1px}
.ca{padding:20px 24px;overflow-y:auto;flex:1}

/* ── STATS ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px}
.sc{background:var(--w);border:1px solid var(--bdr);border-radius:var(--r);padding:15px 17px;box-shadow:var(--sh)}
.sc-ic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-bottom:7px}
.sc-n{font-size:22px;font-weight:800;color:var(--t);letter-spacing:-.5px;line-height:1.1}
.sc-l{font-size:11.5px;color:var(--t2);margin-top:3px;font-weight:500}

/* ── CARDS ── */
.card{background:var(--w);border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh)}
.cp{padding:16px 18px}
.ct{font-size:13px;font-weight:700;color:var(--t);margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* ── TABLE ── */
.tw{background:var(--w);border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
table{width:100%;border-collapse:collapse}
th{padding:9px 13px;text-align:left;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);border-bottom:1px solid var(--bdr);background:var(--bg2)}
td{padding:10px 13px;border-bottom:1px solid #f1f5f9;vertical-align:middle;font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbff}

/* ── PROGRESS ── */
.pb{height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;flex:1}
.pf{height:100%;border-radius:3px;transition:width .4s ease}

/* ── BTNS ── */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;cursor:pointer;font-family:inherit;font-weight:600;border-radius:var(--rs);transition:all .12s;white-space:nowrap}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bp{background:var(--p);color:#fff;padding:7px 15px;font-size:13px}.bp:hover:not(:disabled){background:var(--pd)}
.bs{background:var(--w);color:var(--t);padding:7px 14px;font-size:13px;border:1px solid var(--bdr)}.bs:hover:not(:disabled){background:var(--bg2)}
.bg_{background:transparent;color:var(--t2);padding:5px 9px;font-size:12px;border:none}.bg_:hover{background:#f1f5f9;color:var(--t)}
.bsm{padding:5px 10px;font-size:12px}.bxs{padding:3px 8px;font-size:11.5px}
.bd{background:#fef2f2;color:var(--er);border:1px solid #fecdd3;padding:4px 10px;font-size:12px}.bd:hover{background:#fee2e2}

/* ── BADGES ── */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11.5px;font-weight:600}
.bi{background:#eef2ff;color:#4338ca}.bgreen{background:#dcfce7;color:#166534}
.bamb{background:#fffbeb;color:#92400e}.bsk{background:#f0f9ff;color:#0c4a6e}
.bsl{background:#f1f5f9;color:#475569}.bvio{background:#f5f3ff;color:#5b21b6}
.bpnk{background:#fdf2f8;color:#831843}

/* ── AV ── */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;letter-spacing:-.5px}
.cls-badge{padding:2px 8px;border-radius:12px;font-size:11.5px;font-weight:700;display:inline-flex;align-items:center;gap:3px}

/* ── GRADING ── */
.grade-layout{display:grid;grid-template-columns:250px 1fr;gap:14px;max-height:calc(100vh - 160px)}
.grade-list{background:var(--w);border:1px solid var(--bdr);border-radius:var(--r);overflow-y:auto}
.grade-hdr{padding:9px 13px;border-bottom:1px solid var(--bdr);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3)}
.gi{padding:10px 13px;border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:9px}
.gi:hover{background:#fafbff}.gi.on{background:var(--pl)}.gi:last-child{border-bottom:none}
.grade-panel{background:var(--w);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;overflow-y:auto}
.ans-box{background:#f8fafc;border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;font-size:13.5px;line-height:1.7;color:var(--t);font-style:italic}
.score-inp{width:70px;border:2px solid var(--bdr);border-radius:var(--rs);padding:7px 10px;font-size:17px;font-weight:700;text-align:center;font-family:inherit;outline:none;transition:border .1s}
.score-inp:focus{border-color:var(--p)}
.stabs{display:flex;gap:2px;background:#f1f5f9;border-radius:8px;padding:3px;margin-bottom:14px;width:fit-content}
.stab{padding:5px 13px;border-radius:6px;border:none;font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;transition:all .12s;color:var(--t2);background:transparent}
.stab.on{background:var(--w);color:var(--t);box-shadow:0 1px 3px rgba(0,0,0,.1)}

/* ── REPORTS ── */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{font-size:12px;color:var(--t2);min-width:80px;text-align:right;font-weight:500}
.bar-track{flex:1;height:20px;background:#f1f5f9;border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .6s ease;display:flex;align-items:center;padding-left:7px}
.bar-val{font-size:11px;font-weight:700;color:rgba(255,255,255,.95)}

/* ── LEERSTUDIO ── */
.studio-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.studio-topbar{height:48px;background:var(--w);border-bottom:1px solid var(--bdr);padding:0 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.studio-body{display:flex;flex:1;overflow:hidden}
.ed-left{width:240px;border-right:1px solid var(--bdr);background:var(--w);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.ed-left-hdr{padding:9px 10px 5px;display:flex;align-items:center;justify-content:space-between}
.ed-left-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)}
.ftree{padding:4px 6px}
.f-row{display:flex;align-items:center;gap:5px;padding:5px 7px;border-radius:6px;cursor:pointer;font-size:12.5px;color:var(--t2);transition:all .1s;user-select:none;position:relative}
.f-row:hover{background:#f1f5f9;color:var(--t)}.f-row.on{background:var(--pl);color:var(--p);font-weight:600}
.f-chev{font-size:9px;transition:transform .12s;flex-shrink:0;color:var(--t3)}.f-chev.open{transform:rotate(90deg)}
.f-actions{display:none;margin-left:auto;gap:2px}.f-row:hover .f-actions{display:flex}.mp-row:hover .f-actions{display:flex}
.f-children{padding-left:14px;border-left:1.5px solid #e2e8f0;margin-left:8px;margin-top:2px}
.mp-row{display:flex;align-items:center;gap:5px;padding:5px 8px;border-radius:5px;cursor:pointer;font-size:12px;color:var(--t2);transition:all .1s;margin-bottom:1px;justify-content:space-between}
.mp-row:hover{background:#f1f5f9;color:var(--t)}.mp-row.on{background:var(--pl);color:var(--p);font-weight:600}
.ed-blk-list{border-top:1px solid var(--bdr);padding:8px 8px}
.ed-blk-list-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);margin-bottom:6px}
.blk-nav-item{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:var(--rs);cursor:pointer;border:1.5px solid transparent;margin-bottom:3px;background:var(--bg2);transition:all .1s}
.blk-nav-item:hover{border-color:var(--pb);background:var(--pl)}.blk-nav-item.on{border-color:var(--p);background:var(--pl)}
.blk-nav-type{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--t3)}
.blk-nav-title{font-size:12px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px}
.add-blk-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-top:8px;padding-top:8px;border-top:1px dashed var(--bdr)}
.add-blk-btn{display:flex;align-items:center;gap:4px;padding:6px 8px;border-radius:var(--rs);border:1px solid var(--bdr);background:var(--w);cursor:pointer;font-size:11px;color:var(--t2);transition:all .1s;font-family:inherit}
.add-blk-btn:hover{background:var(--pl);border-color:var(--pb);color:var(--p)}
.ed-center{flex:1;overflow-y:auto;background:var(--bg);display:flex;flex-direction:column}
.ed-center-toolbar{height:42px;background:var(--w);border-bottom:1px solid var(--bdr);padding:0 18px;display:flex;align-items:center;gap:5px;flex-shrink:0}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:5px;border:1px solid var(--bdr);background:var(--w);color:var(--t2);font-size:12px;font-weight:600;cursor:pointer;transition:all .1s;font-family:inherit}
.chip:hover{background:var(--pl);border-color:var(--pb);color:var(--p)}
.ed-body{padding:20px 24px;max-width:720px;width:100%;margin:0 auto;flex:1}
.pad-title-inp{font-size:22px;font-weight:900;color:var(--t);background:transparent;border:none;outline:none;width:100%;padding:4px 0;letter-spacing:-.5px;border-bottom:2px solid transparent;transition:border .15s;margin-bottom:4px}
.pad-title-inp:focus{border-bottom-color:var(--p)}
.pad-meta-row{font-size:12px;color:var(--t3);margin-bottom:20px;display:flex;align-items:center;gap:8px}
.blk{border-radius:var(--r);border:2px solid;padding:18px;margin-bottom:12px;cursor:pointer;transition:all .15s}
.blk:hover{box-shadow:0 3px 12px rgba(0,0,0,.08)}.blk.selected{box-shadow:0 0 0 3px rgba(79,70,229,.2)}
.btype-THEORY{background:#eef2ff;border-color:#c7d2fe}.btype-THEORY.selected{border-color:#6366f1}
.btype-EXAMPLE{background:#ecfdf5;border-color:#a7f3d0}.btype-EXAMPLE.selected{border-color:#10b981}
.btype-FILL_IN{background:#fffbeb;border-color:#fde68a}.btype-FILL_IN.selected{border-color:#f59e0b}
.btype-MULTIPLE_CHOICE{background:#f5f3ff;border-color:#ddd6fe}.btype-MULTIPLE_CHOICE.selected{border-color:#8b5cf6}
.btype-MATCHING{background:#f0f9ff;border-color:#bae6fd}.btype-MATCHING.selected{border-color:#0ea5e9}
.btype-OPEN{background:#fff1f2;border-color:#fecdd3}.btype-OPEN.selected{border-color:#e11d48}
.blk-hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.blk-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;margin-bottom:1px}
.lbl-THEORY{color:#4338ca}.lbl-EXAMPLE{color:#065f46}.lbl-FILL_IN{color:#92400e}
.lbl-MULTIPLE_CHOICE{color:#5b21b6}.lbl-MATCHING{color:#075985}.lbl-OPEN{color:#9f1239}
.blk-title{font-size:14px;font-weight:700;color:var(--t);flex:1;min-width:0}
.blk-actions{display:flex;gap:3px;opacity:0;transition:opacity .1s}
.blk:hover .blk-actions,.blk.selected .blk-actions{opacity:1}
.blk-prev{background:rgba(255,255,255,.7);border:1px solid rgba(0,0,0,.06);border-radius:var(--rs);padding:12px;font-size:13.5px;line-height:1.8;color:var(--t)}
.blk-form{background:var(--w);border:2px solid var(--pb);border-radius:var(--r);padding:18px;margin-bottom:12px;box-shadow:0 4px 16px rgba(79,70,229,.1)}
.bfl{display:block;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--t3);margin-bottom:5px}
.bfi{width:100%;border:1.5px solid var(--bdr);border-radius:var(--rs);padding:8px 12px;font-size:13.5px;font-family:inherit;color:var(--t);outline:none;transition:border .12s;background:var(--w)}
.bfi:focus{border-color:var(--p)}
.bfta{resize:vertical;min-height:80px;line-height:1.65}
.lx-prev-box{background:#f8fafc;border:1px solid var(--bdr);border-radius:var(--rs);padding:11px 14px;margin-top:6px;font-size:13.5px;line-height:1.8;min-height:40px}
.lx-hint{font-size:11px;color:var(--t3);margin-top:4px}
.mc-opt-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mc-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--bdr);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .1s}
.mc-radio.ok{border-color:var(--ok);background:var(--ok)}
.pair-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.pair-sep{color:var(--t3);font-size:13px;flex-shrink:0}
.remove-pair{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px 4px;font-size:18px;line-height:1;transition:color .1s}
.remove-pair:hover{color:var(--er)}
.ed-right{width:240px;border-left:1px solid var(--bdr);background:var(--w);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden}
.rp-hdr{padding:11px 13px;border-bottom:1px solid var(--bdr);font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);display:flex;align-items:center;justify-content:space-between}
.rp-body{overflow-y:auto;flex:1;padding:7px 7px}
.rp-item{display:flex;align-items:center;gap:8px;padding:7px 8px;border-radius:var(--rs);cursor:pointer;transition:all .1s;margin-bottom:3px;border:1.5px solid transparent}
.rp-item:hover{background:#f8faff;border-color:var(--bdr)}.rp-item.on{background:var(--pl);border-color:var(--pb)}
.rp-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.rp-info{flex:1;min-width:0}
.rp-type{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--t3)}
.rp-title{font-size:12.5px;font-weight:600;color:var(--t);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

const LX = {
  render(f, d=false) {
    if(!f||!window.katex) return `<code>${esc(f)}</code>`;
    try { return katex.renderToString(f.trim(),{displayMode:d,throwOnError:false,output:'html',trust:false,strict:false}); }
    catch(e) { return `<span style="color:#e11d48;font-family:monospace;font-size:12px;background:#fff1f2;padding:2px 5px;border-radius:4px">${esc(f)}</span>`; }
  },
  text(raw) {
    if(!raw) return '';
    let r='', last=0;
    const p = /(\$\$[\s\S]*?\$\$|\$[^\$\n]+?\$|\*\*.*?\*\*|\n)/g;
    let m;
    while((m=p.exec(raw))!==null) {
      if(m.index>last) r+=esc(raw.slice(last,m.index));
      const t=m[0];
      if(t.startsWith('$$'))      r+=`<div style="text-align:center;margin:8px 0;overflow-x:auto">${this.render(t.slice(2,-2),true)}</div>`;
      else if(t.startsWith('$'))  r+=this.render(t.slice(1,-1),false);
      else if(t.startsWith('**')) r+=`<strong>${esc(t.slice(2,-2))}</strong>`;
      else if(t==='\n')           r+='<br>';
      last=p.lastIndex;
    }
    if(last<raw.length) r+=esc(raw.slice(last));
    return r;
  }
};
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

  ${S.authRole==='student'?`<div class="fg"><label class="fl">Leerkrachtcode</label><input class="fi${e.code?' err':''}" id="r-code" placeholder="Bv. MARTENS-7F2K" style="font-family:monospace;letter-spacing:2px;text-transform:uppercase"><div class="ferr">${e.code||''}</div><div class="info-note">ℹ️ Vraag de code aan je leerkracht. Je verschijnt dan in hun dashboard.</div></div>`:''}
  <button class="btn-full btn-pp" onclick="doRegister()">Account aanmaken →</button>`;}
function doRegister(){
  const nm=$('r-nm')?.value.trim()||'';const usr=$('r-user')?.value.trim().toLowerCase()||'';
  const pw=$('r-pw')?.value||'';const code=$('r-code')?.value.trim().toUpperCase()||'';
  const errs={};
  if(!nm)errs.naam='Vul je voornaam in.';
  if(!usr)errs.user='Gebruikersnaam is verplicht.';
  else if(!/^[a-z0-9_]+$/.test(usr))errs.user='Alleen kleine letters, cijfers en _ toegestaan.';
  if(S.authRole==='teacher'){const em=$('r-em')?.value.trim()||'';if(!em||!em.includes('@'))errs.email='Geldig e-mailadres vereist.';}
  if(pw.length<8)errs.pw='Min. 8 tekens.';else if(!/[A-Z]/.test(pw))errs.pw='Min. één hoofdletter.';else if(!/[0-9]/.test(pw))errs.pw='Min. één cijfer.';
  if(S.authRole==='student'&&!code)errs.code='Leerkrachtcode is verplicht.';
  else if(S.authRole==='student'&&code&&code!=='MARTENS-7F2K')errs.code='Ongeldige leerkrachtcode.';
  if(Object.keys(errs).length){upd({authErrs:errs});return;}
  const voornaam=nm;const achternaam=$('r-anm')?.value.trim()||'';
  const volledigenaam=(voornaam+' '+achternaam).trim();
  if(S.authRole==='teacher'){
    // Werk het leerkrachtaccount bij met de ingetypte gegevens
    ACCOUNTS.teacher.name=volledigenaam||usr;
    ACCOUNTS.teacher.username=usr;
    ACCOUNTS.teacher.email=$('r-em')?.value.trim()||'';
    showToast('Account aangemaakt!','ok');loginAs('teacher');
  } else {
    // Voeg leerling toe als nieuwe (pending) leerling
    const kleur=['#4f46e5','#0ea5e9','#10b981','#f59e0b','#8b5cf6','#e11d48','#14b8a6','#ec4899'];
    const newId='s-'+Date.now();
    const color=kleur[Math.floor(Math.random()*kleur.length)];
    ACCOUNTS[newId]={id:newId,name:volledigenaam||usr,username:usr,role:'student',classId:null,color};
    T_PENDING.push({id:newId,name:volledigenaam||usr,color,when:'Zojuist'});
    showToast('Account aangemaakt! Je leerkracht wijst je toe aan een klas.','ok');
    // Log in als deze nieuwe leerling
    loginAs(newId);
  }
}
function loginAs(id){
  const user=ACCOUNTS[id];if(!user)return;
  if(user.role==='teacher')upd({user,screen:'teacher',tTab:'dashboard',authErrs:{}});
  else upd({user,screen:'dash',authErrs:{},currentPad:null});
}

function saveGrade(id){
  const score=$('g-score')?.value;const fb=$('g-fb')?.value||'';

}

function tReports(){
  const selPadId=S.reportPad||(PADS.find(p=>p.published)?.id)||null;
  const selPad=PADS.find(p=>p.id===selPadId);
  const blocks=(EDIT_BLOCKS[selPadId]||[]).sort((a,b)=>a.order-b.order);
  const DEMO_SCORES={'b1':{avg:94,att:5},'b2':{avg:88,att:5},'b3':{avg:52,att:5},'b4':{avg:78,att:5},'b5':{avg:41,att:4},'b6':{avg:63,att:3}};
  const blockRows=blocks.map(b=>{const sc=DEMO_SCORES[b.id]||{avg:Math.floor(50+Math.random()*45),att:Math.floor(2+Math.random()*4)};const col=sc.avg>=80?'var(--ok)':sc.avg>=55?'var(--wn)':'var(--er)';return{b,sc,col};});
  const sorted=[...blockRows].sort((a,b)=>a.sc.avg-b.sc.avg);

  if(!S.reportFolderExp) S.reportFolderExp=new Set(FOLDERS.map(f=>f.id));

  const renderTree=(parentId,depth=0)=>FOLDERS.filter(f=>f.parentId===parentId).map(f=>{
    const exp=S.reportFolderExp.has(f.id);
    const pads=PADS.filter(p=>p.folderId===f.id&&p.published);

    if(!pads.length&&!hasSubs)return'';

        ${pads.length?`<span style="font-size:10.5px;color:var(--t3);background:var(--bg);border:1px solid var(--bdr);padding:1px 7px;border-radius:10px;flex-shrink:0">${pads.length}</span>`:''}
      </div>
      ${exp?`<div style="margin-left:${pl+20}px;border-left:2px solid #e2e8f0;padding-left:6px;margin-bottom:4px">

          return`<div onclick="upd({reportPad:'${pad.id}'})"

            ${ic('file',14,isSel?'var(--p)':'#94a3b8')}

            ${isSel?`<span style="font-size:12px;color:var(--p);font-weight:700;flex-shrink:0">✓</span>`:''}
          </div>`;
        }).join('')}
        ${renderTree(f.id,depth+1)}
      </div>`:''}
    </div>`;
  }).join('');

  const treeHTML=renderTree(null);

  return`<div>
    <div style="display:grid;grid-template-columns:260px 1fr;gap:18px;align-items:start">

      <!-- Linkerpaneel: mappenstructuur -->

          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3)">MathPad kiezen</div>
        </div>
        <div style="padding:8px 8px;max-height:calc(100vh - 220px);overflow-y:auto">
          ${treeHTML||`<div style="padding:20px;text-align:center;color:var(--t3);font-size:13px">Geen gepubliceerde leerpaden.</div>`}
        </div>

        ${!selPad
          ?`<div class="card cp" style="text-align:center;padding:48px 20px;color:var(--t3)">
              ${ic('chart',32,'var(--t3)')}<br><br>
              <div style="font-size:15px;font-weight:600;color:var(--t2);margin-top:4px">Kies een MathPad</div>

              <div class="sc"><div class="sc-ic" style="background:#eef2ff">${ic('file',15,'#4f46e5')}</div><div class="sc-n">${blocks.length}</div><div class="sc-l">Blokken</div></div>

            </div>
            <div class="two-col">
              <div class="card cp">
                <div class="ct">Gemiddelde score per blok</div>
                ${blockRows.length===0?`<div class="empty-s">Geen blokken in dit leerpad.</div>`
                :blockRows.map(({b,sc,col})=>`<div style="margin-bottom:12px">

                  </div>
                  <div style="font-size:11px;color:var(--t3)">${sc.att} leerlingen · ${BM[b.type]?.label||b.type}</div>
                </div>`).join('')}
              </div>
              <div class="card cp">
                <div class="ct">Moeilijkste blokken</div>
                ${sorted.slice(0,5).map(({b,sc,col},i)=>`<div style="display:flex;align-items:flex-start;gap:12px;padding:11px 12px;background:${sc.avg<55?'var(--er-b)':sc.avg<80?'var(--wn-b)':'var(--ok-b)'};border-radius:9px;margin-bottom:8px;border:1px solid ${sc.avg<55?'var(--er-br)':sc.avg<80?'var(--wn-br)':'var(--ok-br)'}">

                    <div style="font-size:11.5px;color:var(--t3);margin-top:2px">${BM[b.type]?.label||b.type} · ${sc.att} leerlingen</div>

}

function renderFolderTree(parentId){

    const exp=S.folderExp.has(f.id);const pads=PADS.filter(p=>p.folderId===f.id);

        <button style="background:none;border:none;cursor:pointer;padding:1px 3px;display:flex;color:var(--t3)" title="Verwijder map" onclick="deleteFolder('${f.id}',${hasChildren})">${ic('trash',10)}</button>

    </div>

        <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:0">${ic('file',11,'var(--t3)')}<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:12px">${esc(pad.title)}</span></div>
        <div style="display:flex;align-items:center;gap:3px;flex-shrink:0">
          <span class="f-actions" style="gap:1px;margin-left:0" onclick="event.stopPropagation()">
            <button style="background:none;border:none;cursor:pointer;padding:2px 3px;display:flex;color:var(--t3);border-radius:4px" title="Verplaatsen naar map" onclick="upd({modal:{type:'move-pad',padId:'${pad.id}'}})">${ic('folder',11)}</button>
            <button style="background:none;border:none;cursor:pointer;padding:2px 3px;display:flex;color:var(--t3);border-radius:4px" title="Dupliceren" onclick="dupPad('${pad.id}')">${ic('copy',11)}</button>
            <button style="background:none;border:none;cursor:pointer;padding:2px 3px;display:flex;color:var(--er);border-radius:4px" title="Verwijderen" onclick="deletePad('${pad.id}')">${ic('trash',11)}</button>

        </div>

    </div>`:''}

  }).join('');
}
function toggleFolder(id){const e=new Set(S.folderExp);e.has(id)?e.delete(id):e.add(id);upd({folderExp:e});}
function renameFolder(id,cur){const n=prompt('Nieuwe naam:',cur);if(n){const f=FOLDERS.find(fl=>fl.id===id);if(f)f.name=n;upd({});showToast('Map hernoemd','ok');}}
function deleteFolder(id,hasChildren){
  if(hasChildren&&!confirm('Deze map bevat nog inhoud. Toch verwijderen? (inhoud blijft bewaard)'))return;
  const idx=FOLDERS.findIndex(f=>f.id===id);if(idx>=0){
    // verplaats pads naar root
    PADS.filter(p=>p.folderId===id).forEach(p=>p.folderId=null);
    // verplaats submappen naar root
    FOLDERS.filter(f=>f.parentId===id).forEach(f=>f.parentId=null);
    FOLDERS.splice(idx,1);
  }
  upd({});showToast('Map verwijderd','info');
}
function dupPad(id){
  const src=PADS.find(p=>p.id===id);if(!src)return;
  const newId='mp-'+Date.now();
  PADS.push({...src,id:newId,title:src.title+' (kopie)',published:false,classIds:[]});
  EDIT_BLOCKS[newId]=JSON.parse(JSON.stringify(EDIT_BLOCKS[id]||[]));
  const e=new Set(S.folderExp);if(src.folderId)e.add(src.folderId);
  upd({folderExp:e});showToast('MathPad gedupliceerd','ok');
}
function deletePad(id){
  if(!confirm('MathPad verwijderen?'))return;
  const idx=PADS.findIndex(p=>p.id===id);if(idx>=0)PADS.splice(idx,1);
  delete EDIT_BLOCKS[id];
  const sel=S.studioSelPad===id?null:S.studioSelPad;
  upd({studioSelPad:sel,editBlocks:sel?S.editBlocks:null});showToast('MathPad verwijderd','info');
}
function addFolder(){const n=prompt('Naam nieuwe hoofdmap:','Nieuwe map');if(!n)return;const id='f-'+Date.now();FOLDERS.push({id,name:n,parentId:null});const e=new Set(S.folderExp);e.add(id);upd({folderExp:e});showToast('Hoofdmap aangemaakt','ok');}
function addSubFolder(parentId,name){
  const n=name||prompt(`Submap:`, 'Nieuwe submap');
  if(!n)return;
  const id='f-'+Date.now();
  FOLDERS.push({id,name:n,parentId});
  const e=new Set(S.folderExp);e.add(parentId);e.add(id);
  upd({folderExp:e});showToast('Submap aangemaakt','ok');
}
function addPad(folderId,name){
  const n=name||prompt('Naam MathPad:','Nieuwe MathPad');if(!n)return;
  const targetFolder=folderId||(PADS.find(p=>p.id===S.studioSelPad)?.folderId)||FOLDERS[0]?.id||null;
  const id='mp-'+Date.now();
  PADS.push({id,title:n,folderId:targetFolder,published:false,classIds:[]});
  EDIT_BLOCKS[id]=[];
  if(targetFolder){const e=new Set(S.folderExp);e.add(targetFolder);S.folderExp=e;}
  openStudioPad(id);showToast('MathPad aangemaakt!','ok');
}
function openStudioPad(id){const blocks=JSON.parse(JSON.stringify(EDIT_BLOCKS[id]||[]));upd({studioSelPad:id,editBlocks:blocks,studioSelBlock:null,isDirty:false});}
function updatePadTitle(val){const pad=PADS.find(p=>p.id===S.studioSelPad);if(pad)pad.title=val;S.isDirty=true;}
function savePad(publish){const pad=PADS.find(p=>p.id===S.studioSelPad);if(!pad)return;if(publish)pad.published=true;if(S.editBlocks)EDIT_BLOCKS[S.studioSelPad]=S.editBlocks;upd({isDirty:false,isSaving:false});showToast(publish?'MathPad gepubliceerd!':'Opgeslagen!','ok');}
function selectEdBlock(id){upd({studioSelBlock:S.studioSelBlock===id?null:id});}
function addEdBlock(type){
  if(!S.studioSelPad){showToast('Selecteer eerst een MathPad','info');return;}
  const blocks=getEditBlocks();const nb={id:'blk-'+Date.now(),type,order:blocks.length,title:BM[type].label+' blok',content:DEFAULT_CONTENT[type]()};

function deleteEdBlock(id){const blocks=getEditBlocks().filter(b=>b.id!==id).map((b,i)=>({...b,order:i}));if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;upd({editBlocks:blocks,studioSelBlock:S.studioSelBlock===id?null:S.studioSelBlock,isDirty:true});showToast('Blok verwijderd','info');}
function dupEdBlock(id){const blocks=getEditBlocks();const idx=blocks.findIndex(b=>b.id===id);if(idx<0)return;const copy={...JSON.parse(JSON.stringify(blocks[idx])),id:'blk-'+Date.now(),title:blocks[idx].title+' (kopie)',order:blocks.length};const nb=[...blocks.slice(0,idx+1),copy,...blocks.slice(idx+1)].map((b,i)=>({...b,order:i}));if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=nb;upd({editBlocks:nb,studioSelBlock:copy.id,isDirty:true});showToast('Blok gedupliceerd','ok');}
function moveEdBlock(id,dir){const blocks=[...getEditBlocks()].sort((a,b)=>a.order-b.order);const idx=blocks.findIndex(b=>b.id===id);const j=idx+dir;if(j<0||j>=blocks.length)return;const tmp=blocks[idx].order;blocks[idx].order=blocks[j].order;blocks[j].order=tmp;const nb=[...blocks];if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=nb;upd({editBlocks:nb,isDirty:true});}
function updateEdContent(id,field,val){const blocks=getEditBlocks().map(b=>b.id!==id?b:{...b,content:{...b.content,[field]:typeof val==='number'?val:val}});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;const prev=document.getElementById('lxp-'+id);if(prev&&(field==='text'||field==='q'||field==='problem'||field==='solution'))prev.innerHTML=LX.text(val);}
function updateEdBlockTitle(id,val){const blocks=getEditBlocks().map(b=>b.id!==id?b:{...b,title:val});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;const rpt=document.querySelector(`#rp-${id} .rp-title`);if(rpt)rpt.textContent=val;}
function updateMCOpt(id,idx,val){const blocks=getEditBlocks().map(b=>{if(b.id!==id)return b;const opts=[...(b.content.opts||[])];opts[idx]=val;return{...b,content:{...b.content,opts}};});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;}
function setMCCorrect(id,idx){const blocks=getEditBlocks().map(b=>b.id!==id?b:{...b,content:{...b.content,ci:idx}});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;document.querySelectorAll(`#bi-${id} .mc-radio`).forEach((r,i)=>{r.className='mc-radio'+(i===idx?' ok':'');r.innerHTML=i===idx?ic('check',10,'#fff'):'';});}
function updatePair(id,idx,side,val){const blocks=getEditBlocks().map(b=>{if(b.id!==id)return b;const pairs=[...(b.content.pairs||[])];if(pairs[idx])pairs[idx]={...pairs[idx],[side]:val};return{...b,content:{...b.content,pairs}};});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;}
function addPair(id){const blocks=getEditBlocks().map(b=>b.id!==id?b:{...b,content:{...b.content,pairs:[...(b.content.pairs||[]),{l:'',r:''}]}});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;upd({});}
function removePair(id,idx){const blocks=getEditBlocks().map(b=>{if(b.id!==id)return b;const pairs=[...(b.content.pairs||[])];pairs.splice(idx,1);return{...b,content:{...b.content,pairs}};});S.editBlocks=blocks;S.isDirty=true;if(EDIT_BLOCKS[S.studioSelPad])EDIT_BLOCKS[S.studioSelPad]=blocks;upd({});}

  else if(block.type==='MULTIPLE_CHOICE'){const opts=(c.opts||['','','','']).map((opt,i)=>`<div class="mc-opt-row"><div class="mc-radio${c.ci===i?' ok':''}" onclick="event.stopPropagation();setMCCorrect('${block.id}',${i})">${c.ci===i?ic('check',10,'#fff'):''}</div><input class="bfi" style="flex:1" value="${esc(opt)}" oninput="updateMCOpt('${block.id}',${i},this.value)" placeholder="Optie ${String.fromCharCode(65+i)}"></div>`).join('');fields=`<div class="fg"><label class="bfl">Vraag</label><textarea class="bfi bfta" rows="2" oninput="updateEdContent('${block.id}','q',this.value)">${esc(c.q||'')}</textarea><div class="lx-prev-box" id="lxp-${block.id}" style="margin-top:5px">${LX.text(c.q||'')}</div></div><div class="fg"><label class="bfl">Opties (klik cirkel = correct)</label>${opts}</div><div class="fg"><label class="bfl">Uitleg</label><input class="bfi" value="${esc(c.exp||'')}" oninput="updateEdContent('${block.id}','exp',this.value)" placeholder="Uitleg..."></div>`;}

  return`<div class="blk-form" onclick="event.stopPropagation()">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--bdr)">

// Helper: is een pad verlopen voor de huidige leerling?
function isPadExpiredForStudent(padId){
  const u=S.user;if(!u)return false;
  const assign=getAssign(padId,u.id)||getAssign(padId,u.classId);
  return !!(assign?.to&&assign.to<today());
}

function studentDashHTML(){
  const u=S.user;const cls=CLASSES[u.classId];
  const classPads=PADS.filter(p=>p.published&&(p.classIds||[]).includes(u.classId));
  const indivPads=PADS.filter(p=>p.published&&!(p.classIds||[]).includes(u.classId)
    &&(S.studentPadAccess||{})['st-'+u.id+'-pad-'+p.id]===true);
  const allPads=[...classPads,...indivPads];
  const activePads=allPads.filter(p=>!isPadExpiredForStudent(p.id));
  const expiredPads=allPads.filter(p=>isPadExpiredForStudent(p.id));

  const padCard=(pad,expired=false)=>{
    const blocks=EDIT_BLOCKS[pad.id]||[];const done=blocks.filter(b=>S.sProg[b.id]?.done).length;
    const total=blocks.length;const pct=total?Math.round(done/total*100):0;const isDone=done===total&&total>0;const isStarted=done>0&&!isDone;
    const cardBg=expired?'#f8fafc':'var(--w)';const cardBdr=expired?'var(--bdr)':'var(--bdr)';
    return`<div class="pad-card" style="background:${cardBg};opacity:${expired?.8:1}" onclick="upd({currentPad:'${pad.id}',screen:'path'})">

function sRefreshProgress(){

const SBM={THEORY:{cls:'sb-th',lcls:'lbl-THEORY'},EXAMPLE:{cls:'sb-ex',lcls:'lbl-EXAMPLE'},FILL_IN:{cls:'sb-fi',lcls:'lbl-FILL_IN'},MULTIPLE_CHOICE:{cls:'sb-mc',lcls:'lbl-MULTIPLE_CHOICE'},MATCHING:{cls:'sb-ma',lcls:'lbl-MATCHING'},OPEN:{cls:'sb-op',lcls:'lbl-OPEN'}};

function renderStudentBlock(block, readOnly=false){
  const m=SBM[block.type]||SBM.THEORY;const em=BM[block.type]||BM.THEORY;
  const prog=S.sProg[block.id];const done=prog?.done;const c=block.content||{};
  const checkIc=done&&!readOnly?`<div style="color:var(--ok);flex-shrink:0"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg></div>`:'';

    if(sh){inner+=`<div style="margin-bottom:9px"><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--ok);margin-bottom:5px">Uitwerking</div><div class="code-box">${LX.text(c.solution||'')} </div></div>`;if(!readOnly)inner+=done?'<div class="fb-ok" style="font-size:13px">✅ Bekeken</div>':`<button class="btn bp bsm" style="background:#059669" onclick="sDone('${block.id}')">✓ Begrepen</button>`;
    }else{inner+=`<button class="btn bs bsm" style="border-color:#a7f3d0" onclick="sShowEx('${block.id}')">💡 Toon uitwerking</button>`;}
  }
  else if(block.type==='FILL_IN'){
    const st=S.sFiErr[block.id]||{err:false,hint:false,attempts:0,failed:false};const MAX_ATT=3;
    inner=`<div class="cont-box" style="margin-bottom:9px">${LX.text(c.q||'')} </div>`;
    if(done||readOnly){
      if(prog?.ans&&!st.failed){inner+=`<div class="fb-ok">✅ Correct! ${c.prefix?LX.text(c.prefix)+' ':''}<strong>${prog.ans}</strong></div>`;}
      else{if(prog?.ans)inner+=`<div class="fb-er" style="border-radius:var(--rs);padding:9px 12px">❌ Jouw antwoord: <strong>${prog.ans}</strong></div>`;inner+=`<div style="background:#f0f9ff;border:1px solid #bae6fd;border-radius:var(--rs);padding:9px 12px;font-size:13px;color:#0c4a6e">✏️ Correct antwoord: ${c.prefix?LX.text(c.prefix)+' ':''}<strong>${c.ca}</strong></div>`;}
    }else{
      if(st.err){const left=MAX_ATT-st.attempts;inner+=`<div class="fb-er">❌ Niet correct.${left>0?` Nog <strong>${left}</strong> poging${left!==1?'en':''}`:''}. ${c.hint&&!st.hint&&st.attempts<MAX_ATT?`<button class="btn bg_ bxs" style="margin-left:7px" onclick="sShowHint('${block.id}')">Hint</button>`:''}${st.hint&&c.hint?`<div class="hint-box" style="margin-top:5px">💡 ${c.hint}</div>`:''}</div>`;}
      inner+=`<div style="display:flex;align-items:center;gap:7px">${c.prefix?`<span style="font-family:monospace;font-weight:700;font-size:13.5px">${LX.text(c.prefix)}</span>`:''}<input class="fi" id="sfi-${block.id}" placeholder="Antwoord..." style="max-width:150px;font-family:monospace;font-size:14px" onkeydown="if(event.key==='Enter')sCheckFI('${block.id}')">${c.suffix?`<span style="font-size:13.5px;color:var(--t2)">${LX.text(c.suffix)}</span>`:''}<button class="btn bp bsm" onclick="sCheckFI('${block.id}')">Controleer</button></div>`;
    }
  }
  else if(block.type==='MULTIPLE_CHOICE'){
    const st=S.sMcSt[block.id]||{sel:null,sub:false};const submitted=done||st.sub||readOnly;const letters=['A','B','C','D'];
    inner=`<div class="cont-box" style="margin-bottom:9px">${LX.text(c.q||'')} </div>`;
    inner+=(c.opts||[]).map((opt,i)=>{let cls='mc-opt';if(submitted){cls+=' mc-d';if(i===c.ci)cls+=' mc-ok';else if(st.sel===i)cls+=' mc-er';}else if(st.sel===i)cls+=' mc-sel';return`<button class="${cls}" onclick="${submitted?'':`sMCSel('${block.id}',${i})`}">${letters[i]||i}. ${LX.text(opt)}${submitted&&i===c.ci?' ✅':submitted&&st.sel===i?' ❌':''}</button>`;}).join('');
    if(submitted&&c.exp)inner+=`<div class="fb-ok">${LX.text(c.exp)}</div>`;
    if(!submitted)inner+=`<button class="btn bsm" style="background:#7c3aed;color:#fff;margin-top:8px" onclick="sMCSub('${block.id}',${c.ci})" ${st.sel===null?'disabled':''}>Bevestig antwoord</button>`;
  }
  else if(block.type==='MATCHING'){
    if(!S.sMatchSt[block.id])S.sMatchSt[block.id]={shuffled:[...(c.pairs||[])].map(p=>p.r).sort(()=>Math.random()-.5),matches:{},selLeft:null,submitted:false,submitCount:0,failed:false};
    const st=S.sMatchSt[block.id];const sub=done||st.submitted||readOnly;const numM=Object.keys(st.matches).length;const MAX_ATT=3;const selLeft=st.selLeft;
    const leftItems=(c.pairs||[]).map((pair,i)=>{const isSelected=selLeft===i&&!sub;const matched=st.matches[i];const isOk=sub&&matched===pair.r;const isErr=sub&&matched&&matched!==pair.r;let border=isSelected?'2px solid #0284c7':isOk?'2px solid var(--ok)':isErr?'2px solid var(--er)':'2px solid var(--bdr)';let bg=isSelected?'#e0f2fe':isOk?'var(--ok-b)':isErr?'var(--er-b)':'rgba(255,255,255,.8)';return`<button style="width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:${border};background:${bg};cursor:${sub?'default':'pointer'};font-family:inherit;font-size:13px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;gap:6px;transition:all .12s" onclick="${sub?'':`sMSelL('${block.id}',${i})`}"><span style="flex:1">${LX.text(pair.l)}</span><span style="font-size:14px;flex-shrink:0">${sub?(isOk?'✅':isErr?'❌':''): isSelected?'👆':''}</span></button>`;}).join('');
    const rightItems=st.shuffled.map(val=>{const used=Object.values(st.matches).includes(val);const isTarget=selLeft!==null&&!sub&&!used;return`<button style="width:100%;text-align:left;padding:9px 12px;border-radius:8px;border:2px solid ${isTarget?'#0284c7':used?'#d1d5db':'var(--bdr)'};background:${isTarget?'#e0f2fe':used?'#f9fafb':'rgba(255,255,255,.8)'};cursor:${sub||used?'default':'pointer'};font-family:inherit;font-size:13px;opacity:${used?.55:1};margin-bottom:6px;transition:all .12s" onclick="${sub||used?'':`sMSelR('${block.id}','${encodeURIComponent(val)}')`}">${LX.text(val)}${used?` <span style="font-size:10px;color:#94a3b8;margin-left:4px">(gekoppeld)</span>`:''}</button>`;}).join('');
    const allOk=sub&&(c.pairs||[]).every((p,i)=>st.matches[i]===p.r);
    const matchedPairs=Object.entries(st.matches).filter(([_,v])=>v).map(([idx,val])=>{const pair=(c.pairs||[])[parseInt(idx)];if(!pair)return'';const isOk=sub&&val===pair.r;const isErr=sub&&val!==pair.r;return`<div style="display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:${isOk?'var(--ok-b)':isErr?'var(--er-b)':'#f0f9ff'};border:1px solid ${isOk?'var(--ok-br)':isErr?'var(--er-br)':'#bae6fd'};margin-bottom:5px;font-size:13px"><span style="flex:1;text-align:right">${LX.text(pair.l)}</span><span style="font-size:18px;color:${isOk?'var(--ok)':isErr?'var(--er)':'#0284c7'}">→</span><span style="flex:1">${LX.text(val)}</span>${sub?`<span>${isOk?'✅':'❌'}</span>`:''}</div>`;}).join('');
    inner=`<div class="cont-box" style="margin-bottom:10px;font-size:13px">${c.q||''}</div>${!sub&&selLeft===null?`<div style="font-size:12.5px;color:#0284c7;background:#f0f9ff;border:1px solid #bae6fd;border-radius:7px;padding:8px 12px;margin-bottom:10px;font-weight:500">👆 Klik een item in <strong>Kolom A</strong>, daarna in <strong>Kolom B</strong>.</div>`:''} ${!sub&&selLeft!==null?`<div style="font-size:12.5px;color:#0284c7;background:#e0f2fe;border:1px solid #7dd3fc;border-radius:7px;padding:8px 12px;margin-bottom:10px;font-weight:600">✔ Geselecteerd: ${LX.text((c.pairs||[])[selLeft]?.l||'')} — kies nu in Kolom B →</div>`:''}<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:${numM>0?'10px':'0'}"><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#0284c7;margin-bottom:7px;padding:4px 8px;background:#f0f9ff;border-radius:5px;display:inline-block">Kolom A</div>${leftItems}</div><div><div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#7c3aed;margin-bottom:7px;padding:4px 8px;background:#f5f3ff;border-radius:5px;display:inline-block">Kolom B</div>${rightItems}</div></div>${numM>0&&!sub?`<div style="margin-bottom:10px">${matchedPairs}</div>`:''} ${sub?(allOk?'<div class="fb-ok">✅ Alle koppelingen zijn correct!</div>':`<div style="background:${st.failed?'var(--er-b)':'var(--wn-b)'};border:1px solid ${st.failed?'var(--er-br)':'var(--wn-br)'};border-radius:var(--rs);padding:10px 13px;font-size:13px;color:${st.failed?'var(--er)':'#92400e'}">${st.failed?'❌ Max. pogingen bereikt. ':'Niet correct. '}Juiste antwoorden:<br>${(c.pairs||[]).map(p=>`<div style="display:flex;align-items:center;gap:8px;margin-top:5px;padding:5px 8px;background:rgba(255,255,255,.5);border-radius:5px"><span style="flex:1;text-align:right;font-size:12.5px">${LX.text(p.l)}</span><span style="color:var(--ok);font-weight:700">→</span><span style="flex:1;font-size:12.5px">${LX.text(p.r)}</span></div>`).join('')}</div>`):`<button class="btn bsm" style="background:#0284c7;color:#fff" onclick="sMSub('${block.id}')" ${numM<(c.pairs||[]).length?'disabled':''}>Controleer (${numM}/${(c.pairs||[]).length})${st.submitCount>0?` — nog ${MAX_ATT-st.submitCount} poging${MAX_ATT-st.submitCount!==1?'en':''}`:''}  </button>`}`;
  }
  else if(block.type==='OPEN'){
    const st=S.sOpenSt[block.id]||{txt:'',sub:false};const sub=done||st.sub;const wc=(st.txt||'').trim().split(/\s+/).filter(Boolean).length;const min=c.minWords||20;
    inner=`<div class="cont-box" style="margin-bottom:9px">${LX.text(c.q||'')} </div><textarea class="open-ta" rows="4" placeholder="Schrijf hier jouw antwoord..." ${sub||readOnly?'disabled':''} oninput="sUpdOpen('${block.id}',this.value)">${esc(st.txt)}</textarea><div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px"><span style="font-size:11.5px;color:${wc>=min?'var(--ok)':'var(--t3)'}" id="swc-${block.id}">${wc}/${min} woorden</span>${sub||readOnly?'<div class="fb-ok" style="margin:0;padding:5px 11px;font-size:12px">✅ Ingediend</div>':`<button class="btn bsm" style="background:var(--er);color:#fff" id="sopen-btn-${block.id}" onclick="sSubOpen('${block.id}')" ${wc<min?'disabled':''}>Indienen</button>`}</div>`;

}
function sDone(id){S.sProg[id]={done:true};sRefreshBlock(id);sRefreshProgress();}
function sShowEx(id){S.sExSt[id]=true;sRefreshBlock(id);}
function sShowHint(id){S.sFiErr[id]={...S.sFiErr[id]||{},hint:true};sRefreshBlock(id);}
function sCheckFI(id){
  const block=(EDIT_BLOCKS[S.currentPad]||[]).find(b=>b.id===id);if(!block)return;
  const inp=document.getElementById('sfi-'+id);if(!inp)return;
  const val=inp.value.trim();const ca=(block.content.ca||'').trim().toLowerCase();
  const MAX=3;const cur=S.sFiErr[id]||{err:false,hint:false,attempts:0,failed:false};
  if(val.toLowerCase()===ca){S.sProg[id]={done:true,ans:val};S.sFiErr[id]={...cur,err:false};sRefreshBlock(id);sRefreshProgress();showToast('Correct! 🎉','ok');}
  else{const attempts=(cur.attempts||0)+1;if(attempts>=MAX){S.sFiErr[id]={...cur,err:true,attempts,failed:true};S.sProg[id]={done:true,ans:val,failed:true};sRefreshBlock(id);sRefreshProgress();showToast('❌ 3 pogingen gebruikt — correct antwoord getoond','info');}else{S.sFiErr[id]={...cur,err:true,attempts};sRefreshBlock(id);setTimeout(()=>document.getElementById('sfi-'+id)?.focus(),40);}}
}
function sMCSel(id,i){S.sMcSt[id]={...(S.sMcSt[id]||{}),sel:i};sRefreshBlock(id);}
function sMCSub(id,ci){const st=S.sMcSt[id]||{sel:null};if(st.sel===null)return;S.sMcSt[id]={...st,sub:true};const ok=st.sel===ci;S.sProg[id]={done:true,ok};sRefreshBlock(id);sRefreshProgress();showToast(ok?'Correct! 🎉':'Niet correct — zie uitleg.',ok?'ok':'info');}
function sMSelL(id,i){const st=S.sMatchSt[id]||{};S.sMatchSt[id]={...st,selLeft:st.selLeft===i?null:i};sRefreshBlock(id);}
function sMSelR(id,encoded){const val=decodeURIComponent(encoded);const st=S.sMatchSt[id]||{matches:{},selLeft:null};if(st.selLeft===null)return;const nm={...st.matches};Object.keys(nm).forEach(k=>{if(nm[k]===val)delete nm[k];});nm[st.selLeft]=val;S.sMatchSt[id]={...st,matches:nm,selLeft:null};sRefreshBlock(id);}
function sMSub(id){
  const st=S.sMatchSt[id];if(!st)return;
  const block=(EDIT_BLOCKS[S.currentPad]||[]).find(b=>b.id===id);
  const pairs=block?.content?.pairs||[];const allOk=pairs.every((p,i)=>st.matches[i]===p.r);
  const MAX=3;const submitCount=(st.submitCount||0)+1;
  if(allOk){S.sMatchSt[id]={...st,submitted:true,submitCount};S.sProg[id]={done:true};sRefreshBlock(id);sRefreshProgress();showToast('Alle correct! ✅','ok');}
  else if(submitCount>=MAX){S.sMatchSt[id]={...st,submitted:true,submitCount,failed:true};S.sProg[id]={done:true,failed:true};sRefreshBlock(id);sRefreshProgress();showToast('❌ 3 pogingen gebruikt — juiste antwoorden getoond','info');}
  else{S.sMatchSt[id]={...st,submitCount,matches:{}};sRefreshBlock(id);showToast(`Niet correct. Nog ${MAX-submitCount} poging${MAX-submitCount!==1?'en':''} over.`,'info');}
}
function sUpdOpen(id,val){S.sOpenSt[id]={...S.sOpenSt[id]||{},txt:val};const block=(EDIT_BLOCKS[S.currentPad]||[]).find(b=>b.id===id);const min=block?.content?.minWords||20;const wc=val.trim().split(/\s+/).filter(Boolean).length;const wcel=document.getElementById('swc-'+id);const btn=document.getElementById('sopen-btn-'+id);if(wcel){wcel.textContent=wc+'/'+min+' woorden';wcel.style.color=wc>=min?'var(--ok)':'var(--t3)';}if(btn)btn.disabled=wc<min;}
function sSubOpen(id){const txt=S.sOpenSt[id]?.txt||'';S.sOpenSt[id]={txt,sub:true};S.sProg[id]={done:true,ans:txt};sRefreshBlock(id);sRefreshProgress();showToast('Ingediend! ✅','ok');}
function sRefreshBlock(id){const el=document.getElementById('sblk-'+id);if(!el)return;const block=(EDIT_BLOCKS[S.currentPad]||[]).find(b=>b.id===id);if(!block)return;const tmp=document.createElement('div');tmp.innerHTML=renderStudentBlock(block,isPadExpiredForStudent(S.currentPad));if(tmp.firstElementChild)el.replaceWith(tmp.firstElementChild);}

            ${sts.map(s=>`<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f1f5f9">${av(s.name,s.color,24)}<span style="font-size:13px">${s.name}</span></div>`).join('')}
          </div>`
        :`<div style="display:flex;align-items:center;gap:10px;background:var(--bg2);border-radius:var(--rs);padding:10px 12px;margin-bottom:14px">
          ${av(m.st.name,m.st.color,34)}<div><div style="font-size:14px;font-weight:700">${m.st.name}</div></div>
        </div>`
      }
      <div class="fg"><label class="fl">Nieuw tijdelijk wachtwoord</label>
        <input class="fi" id="pw-new" value="TijdelijkPW1" placeholder="Nieuw wachtwoord">
        <div style="font-size:11.5px;color:var(--t3);margin-top:4px">De leerling ziet dit wachtwoord bij de volgende aanmelding.</div>
      </div>
      <div class="fg"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--t2)">
        <input type="checkbox" id="pw-force" checked style="accent-color:var(--p);width:15px;height:15px"> Leerling moet wachtwoord wijzigen bij eerste aanmelding
      </label></div>
      <div style="display:flex;gap:7px">
        <button class="btn bp" style="flex:1;justify-content:center" onclick="doResetPw(${isBulk?`'${m.classId}',true`:`'${m.st?.id}',false`})">Wachtwoord resetten</button>
        <button class="btn bs" onclick="upd({modal:null})">Annuleer</button>
      </div>
    </div></div>`;
  }

  return'';
}

function doAssign(sid){const classId=document.getElementById('ac-cls')?.value;if(!classId){showToast('Selecteer een klas','info');return;}const pi=T_PENDING.findIndex(p=>p.id===sid);if(pi>=0){const p=T_PENDING[pi];T_PENDING.splice(pi,1);T_STUDENTS.push({id:p.id,name:p.name,classId,color:p.color,score:0,done:0,total:9,lastActive:'Net aangemeld'});}upd({modal:null});showToast('Leerling toegewezen aan klas '+CLASSES[classId]?.name,'ok');}

function createKlas(){
  const nm=document.getElementById('nk-nm')?.value.trim();if(!nm){showToast('Vul een naam in','info');return;}
  const yr=document.getElementById('nk-yr')?.value.trim()||'2024-2025';
  const desc=document.getElementById('nk-desc')?.value.trim()||nm;
  const col=S._newKlasColor||CPAL_OPTS[0];
  const id='c-'+Date.now();
  CLASSES_DATA.push({id,name:nm,year:yr,color:col,desc});
  CLASSES[id]={id,name:nm,year:yr,color:col,desc};
  upd({modal:null,_newKlasColor:null});showToast(`Klas ${nm} aangemaakt!`,'ok');
}

function saveKlas(id){
  const klas=CLASSES_DATA.find(c=>c.id===id);if(!klas)return;
  klas.name=document.getElementById('ek-nm')?.value.trim()||klas.name;
  klas.year=document.getElementById('ek-yr')?.value.trim()||klas.year;
  klas.desc=document.getElementById('ek-desc')?.value.trim()||klas.desc;
  klas.color=S._editKlasColor||klas.color;
  CLASSES[id]=klas;
  upd({modal:null,_editKlasColor:null});showToast('Klas opgeslagen','ok');
}

function deleteKlas(id){
  if(!confirm('Klas verwijderen? Leerlingen worden niet verwijderd.'))return;
  const idx=CLASSES_DATA.findIndex(c=>c.id===id);if(idx>=0)CLASSES_DATA.splice(idx,1);delete CLASSES[id];
  upd({modal:null,selKlas:null});showToast('Klas verwijderd','info');
}

// Rendert de mappenstructuur recursief als checkboxlijst in de toewijzingsmodals.
// prefix = 'apc' (klas) of 'aps' (leerling)
// classId = klas-id wanneer klas-modal, null bij leerling-modal
// student = leerling-object wanneer leerling-modal, null bij klas-modal
function renderPadTree(parentFolderId, prefix, classId, student){
  if(!S.modalFolderExp) S.modalFolderExp = new Set();
  if(S.modalFolderExp.size === 0){
    FOLDERS.forEach(f => S.modalFolderExp.add(f.id));
  }
  const folders = FOLDERS.filter(f => f.parentId === parentFolderId);
  // Enkel gepubliceerde pads tonen in toewijzingsmodal
  const rootPads = PADS.filter(p => p.folderId === parentFolderId && p.published);
  let html = '';

  // MathPads op root-niveau (buiten een map)
  for(const pad of rootPads){
    html += padCheckRow(pad, prefix, classId, student);
  }

  for(const folder of folders){
    const padsInFolder = collectAllPads(folder.id);
    if(padsInFolder.length === 0) continue;
    const isOpen = S.modalFolderExp.has(folder.id);
    const activeCount = padsInFolder.filter(pad =>
      classId ? (pad.classIds||[]).includes(classId)
              : student && ((S.studentPadAccess||{})['st-'+student.id+'-pad-'+pad.id]===true || (pad.classIds||[]).includes(student.classId))
    ).length;

    html += `<div style="margin-bottom:5px">
      <div onclick="toggleModalFolder('${folder.id}')" style="display:flex;align-items:center;gap:7px;padding:8px 10px;background:${isOpen?'#f0f7ff':'#f8fafc'};border:1.5px solid ${isOpen?'#bfdbfe':'var(--bdr)'};border-radius:8px;cursor:pointer;user-select:none;transition:all .12s">
        <span style="font-size:10px;color:var(--t3);transition:transform .15s;display:inline-block;transform:rotate(${isOpen?'90':'0'}deg)">▶</span>
        ${ic('folder',14,isOpen?'#f59e0b':'var(--t3)')}
        <span style="flex:1;font-size:13px;font-weight:700;color:var(--t)">${esc(folder.name)}</span>
        <span style="font-size:11px;color:var(--t3)">${padsInFolder.length} leerpad${padsInFolder.length!==1?'en':''}</span>
        ${activeCount>0?`<span style="background:var(--ok-b);color:var(--ok);border:1px solid var(--ok-br);border-radius:8px;padding:1px 7px;font-size:10.5px;font-weight:700">${activeCount} actief</span>`:''}
      </div>
      ${isOpen?`<div style="padding:8px 4px 4px 20px;border-left:2px solid #dbeafe;margin-left:7px;margin-top:3px">
        ${renderPadTree(folder.id, prefix, classId, student)}
      </div>`:''}
    </div>`;
  }
  return html || `<div class="empty-s" style="padding:12px">Geen leerpaden gevonden.</div>`;
}

function toggleModalFolder(folderId){
  if(!S.modalFolderExp) S.modalFolderExp = new Set();
  const e = new Set(S.modalFolderExp);
  e.has(folderId) ? e.delete(folderId) : e.add(folderId);
  S.modalFolderExp = e;
  // Herrender alleen de modal layer (padChecks staan in state, niet in DOM)
  const ml = document.getElementById('modal-layer');
  if(ml && S.modal) ml.innerHTML = modalHTML();
}

// Verzamel alle pads recursief onder een map
function collectAllPads(folderId){
  // Alleen gepubliceerde pads tellen voor de toewijzingsmodal
  const direct = PADS.filter(p => p.folderId === folderId && p.published);
  const subFolders = FOLDERS.filter(f => f.parentId === folderId);
  return [...direct, ...subFolders.flatMap(f => collectAllPads(f.id))];
}

// Render één pad-rij met checkbox + periode-invoer
function padCheckRow(pad, prefix, classId, student){
  const blocks = EDIT_BLOCKS[pad.id] || [];
  const targetId = classId || student?.id || '';

  // Bepaal de aanvinkstatus vanuit STATE (S.modal.padChecks), niet DOM
  let isActive = false;
  if(classId){
    isActive = (pad.classIds||[]).includes(classId);
  } else if(student){
    const key='st-'+student.id+'-pad-'+pad.id;
    isActive = (S.studentPadAccess||{})[key]===true ||
               ((S.studentPadAccess||{})[key]!==false && (pad.classIds||[]).includes(student.classId));
  }
  // State-override: als gebruiker al geklikt heeft in deze modal-sessie
  const stateChecked = S.modal?.padChecks?.[pad.id];
  const isChecked = stateChecked !== undefined ? stateChecked : isActive;

  const assign = getAssign(pad.id, targetId);
  // Datums vanuit state als beschikbaar, anders bestaande toewijzing of vandaag
  const stDates = S.modal?.padDates?.[pad.id];
  const fromVal = stDates?.from ?? assign?.from ?? today();
  const toVal   = stDates?.to   ?? assign?.to   ?? '';

  const isKlas  = !!classId;
  const activeColor = isKlas?'var(--ok)':'var(--p)';
  const activeBg    = isKlas?'var(--ok-b)':'var(--pl)';
  const activeBdr   = isKlas?'var(--ok-br)':'var(--pb)';
  const pubBadge = pad.published
    ?`<span style="background:#dcfce7;color:#166534;padding:1px 6px;border-radius:8px;font-size:9.5px;font-weight:700">✓ Gepubliceerd</span>`
    :`<span style="background:#fffbeb;color:#92400e;padding:1px 6px;border-radius:8px;font-size:9.5px;font-weight:700">Concept</span>`;

  return `<div style="margin-bottom:8px">
    <label style="display:flex;align-items:center;gap:10px;padding:9px 11px;border:1.5px solid ${isChecked?activeBdr:'var(--bdr)'};border-radius:var(--rs);cursor:pointer;background:${isChecked?activeBg:'var(--w)'};transition:all .12s">
      <input type="checkbox" id="${prefix}-${pad.id}" ${isChecked?'checked':''}
        style="accent-color:var(--p);width:15px;height:15px;cursor:pointer;flex-shrink:0"
        onchange="onPadCheck('${pad.id}',this.checked)">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;color:var(--t);display:flex;align-items:center;gap:7px;flex-wrap:wrap">${esc(pad.title)} ${pubBadge}</div>
        <div style="font-size:11.5px;color:var(--t3);margin-top:2px">${blocks.length} blokken${assign?` · 📅 ${assign.from} → ${assign.to||'…'}`:''}</div>
      </div>
      ${isChecked?`<span style="color:${activeColor};font-size:12px;font-weight:700;flex-shrink:0">${isKlas?'✓ Actief':'Toegang'}</span>`:''}
    </label>
    <div id="period-${pad.id}" style="display:${isChecked?'flex':'none'};align-items:center;gap:8px;margin-top:7px;padding:8px 11px;background:#f0f9ff;border:1px solid #bae6fd;border-radius:7px;flex-wrap:wrap">
      ${ic('clock',12,'#0284c7')}
      <span style="font-size:11.5px;font-weight:600;color:#0c4a6e;flex-shrink:0">Periode:</span>
      <label style="font-size:11.5px;color:var(--t2);display:flex;align-items:center;gap:4px">Van
        <input type="date" value="${fromVal}" style="border:1px solid var(--bdr);border-radius:5px;padding:3px 6px;font-size:12px;font-family:inherit"
          oninput="onPadDate('${pad.id}','from',this.value)">
      </label>
      <label style="font-size:11.5px;color:var(--t2);display:flex;align-items:center;gap:4px">Tot
        <input type="date" value="${toVal}" style="border:1px solid var(--bdr);border-radius:5px;padding:3px 6px;font-size:12px;font-family:inherit"
          oninput="onPadDate('${pad.id}','to',this.value)">
      </label>
    </div>
  </div>`;
}

// Checkbox klik: sla op in state zonder volledige re-render
function onPadCheck(padId, checked){
  if(!S.modal) return;
  if(!S.modal.padChecks) S.modal.padChecks = {};
  S.modal.padChecks[padId] = checked;
  // Toon/verberg periode-rij
  const row = document.getElementById('period-'+padId);
  if(row) row.style.display = checked ? 'flex' : 'none';
}

// Datum wijziging: sla op in state zonder re-render
function onPadDate(padId, field, val){
  if(!S.modal) return;
  if(!S.modal.padDates) S.modal.padDates = {};
  if(!S.modal.padDates[padId]) S.modal.padDates[padId] = {};
  S.modal.padDates[padId][field] = val;
}

function toggleAllStudents(checked, classId){
  const sts=T_STUDENTS.filter(s=>s.classId===classId);
  const ids=checked?sts.map(s=>s.id):[];
  upd({modal:{...S.modal,selSts:ids}});
}
function toggleStudentSel(sid, classId, checked){
  const cur=(S.modal?.selSts||[]);
  const next=checked?[...cur,sid]:cur.filter(id=>id!==sid);
  upd({modal:{...S.modal,selSts:next}});
}
function goToStep2(classId){
  if(!(S.modal?.selSts||[]).length){showToast('Selecteer minstens één leerling','info');return;}
  upd({modal:{...S.modal,step2:true,padChecks:{},padDates:{}}});
}

function savePadMultiStudent(){
  const sids=S.modal?.selSts||[];
  if(!sids.length){showToast('Geen leerlingen geselecteerd','info');return;}
  const checks=S.modal?.padChecks||{};
  const dates=S.modal?.padDates||{};
  const acc={...S.studentPadAccess};
  PADS.filter(p=>p.published).forEach(pad=>{
    const checked=checks[pad.id]; // true/false/undefined
    if(checked===undefined) return; // gebruiker heeft dit pad niet aangeraakt
    const d=dates[pad.id]||{};
    sids.forEach(sid=>{
      const stKey='st-'+sid+'-pad-'+pad.id;
      const assignKey=padAssignKey(pad.id,sid);
      acc[stKey]=checked;
      if(checked){PAD_ASSIGNMENTS[assignKey]={from:d.from||today(),to:d.to||''};}
      else{delete PAD_ASSIGNMENTS[assignKey];}
    });
  });
  const savedPads=PADS.filter(p=>checks[p.id]===true);
  upd({modal:null,studentPadAccess:acc});
  if(savedPads.length){
    const names=savedPads.map(p=>p.title).join(', ');
    const stNames=T_STUDENTS.filter(s=>sids.includes(s.id)).map(s=>s.name.split(' ')[0]).join(', ');
    showToast(`✅ "${names}" toegewezen aan ${stNames}`,'ok');
  } else {
    showToast('Geen leerpaden aangevinkt — niets opgeslagen','info');
  }
}

function doStudioNew(kind, folderId){
  const n=document.getElementById('sn-name')?.value.trim();
  if(!n){showToast('Vul een naam in','info');return;}
  const fid=folderId||null;
  if(kind==='folder'){
    const id='f-'+Date.now();
    FOLDERS.push({id,name:n,parentId:fid});
    const e=new Set(S.folderExp);if(fid)e.add(fid);e.add(id);
    upd({modal:null,folderExp:e});showToast(`Map "${n}" aangemaakt`,'ok');
  } else {
    const targetFolder=fid||(PADS.find(p=>p.id===S.studioSelPad)?.folderId)||FOLDERS[0]?.id||null;
    const id='mp-'+Date.now();
    PADS.push({id,title:n,folderId:targetFolder,published:false,classIds:[]});
    EDIT_BLOCKS[id]=[];
    const e=new Set(S.folderExp);if(targetFolder)e.add(targetFolder);S.folderExp=e;
    upd({modal:null,studioSelPad:id,editBlocks:[],studioSelBlock:null,isDirty:false});
    showToast(`MathPad "${n}" aangemaakt`,'ok');
  }
}

function doMovePad(padId){
  const targetFolder=S.modal?.targetFolder;
  if(!targetFolder){showToast('Kies een map','info');return;}
  const pad=PADS.find(p=>p.id===padId);
  if(pad){pad.folderId=targetFolder;}
  const e=new Set(S.folderExp);e.add(targetFolder);
  upd({modal:null,folderExp:e});showToast('MathPad verplaatst','ok');
}

function savePadKlas(classId){
  const checks=S.modal?.padChecks||{};
  const dates=S.modal?.padDates||{};
  PADS.forEach(pad=>{
    const checked=checks[pad.id];
    if(checked===undefined) return; // niet aangeraakt
    const key=padAssignKey(pad.id,classId);
    if(checked){
      if(!(pad.classIds||[]).includes(classId)) pad.classIds.push(classId);
      const d=dates[pad.id]||{};
      PAD_ASSIGNMENTS[key]={from:d.from||today(),to:d.to||''};
    } else {
      pad.classIds=(pad.classIds||[]).filter(c=>c!==classId);
      delete PAD_ASSIGNMENTS[key];
    }
  });
  upd({modal:null});
  showToast('Leerpaden opgeslagen voor klas '+CLASSES[classId]?.name,'ok');
}

function savePadStudent(sid,classId){
  const checks=S.modal?.padChecks||{};
  const dates=S.modal?.padDates||{};
  const acc={...S.studentPadAccess};
  PADS.filter(p=>p.published).forEach(pad=>{
    const checked=checks[pad.id];
    if(checked===undefined) return;
    const stKey='st-'+sid+'-pad-'+pad.id;
    const assignKey=padAssignKey(pad.id,sid);
    acc[stKey]=checked;
    if(checked){
      const d=dates[pad.id]||{};
      PAD_ASSIGNMENTS[assignKey]={from:d.from||today(),to:d.to||''};
    } else {
      delete PAD_ASSIGNMENTS[assignKey];
    }
  });
  const savedPads2=PADS.filter(p=>checks[p.id]===true);
  upd({modal:null,studentPadAccess:acc});
  const stName=T_STUDENTS.find(s=>s.id===sid)?.name||'leerling';
  if(savedPads2.length){showToast(`✅ "${savedPads2.map(p=>p.title).join(', ')}" → ${stName.split(' ')[0]}`,'ok');}
  else{showToast('Geen leerpaden aangevinkt — niets opgeslagen','info');}
}

function doResetPw(idOrClassId,isBulk){
  const newPw=document.getElementById('pw-new')?.value||'TijdelijkPW1';
  if(isBulk){const sts=T_STUDENTS.filter(s=>s.classId===idOrClassId);showToast(`Wachtwoord van ${sts.length} leerlingen gereset naar: ${newPw}`,'ok');}
  else{const st=T_STUDENTS.find(s=>s.id===idOrClassId)||{name:'leerling'};showToast(`Wachtwoord van ${st.name} gereset naar: ${newPw}`,'ok');}
  upd({modal:null});
}

let _tt=null;
function showToast(msg,type='info'){const t=document.getElementById('toast');if(!t)return;t.textContent=msg;t.className=`toast t${type==='ok'?'ok':type==='info'?'in':'er'}`;if(_tt)clearTimeout(_tt);_tt=setTimeout(()=>t.classList.add('hide'),2800);}

function init(){if(!window.katex){setTimeout(init,100);return;}render();}
init();
</script>
</body>
</html>
